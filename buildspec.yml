version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 947792709243.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t shiek-manual-php-app .
      - docker tag shiek-manual-php-app:latest 947792709243.dkr.ecr.us-east-1.amazonaws.com/shiek-manual-php-app:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image to Amazon ECR...
      - docker push 947792709243.dkr.ecr.us-east-1.amazonaws.com/shiek-manual-php-app:latest
